---
- name: AAP Daily Health Check
  hosts: localhost
  gather_facts: false

  tasks:
    - name: Verify controller API is responsive
      ansible.builtin.uri:
        url: "{{ controller_api_url }}/ping/"
        method: GET
        validate_certs: true
        status_code: 200
        timeout: 10
      register: ping_result

    - name: Verify authentication works
      ansible.builtin.uri:
        url: "{{ controller_api_url }}/me/"
        method: GET
        validate_certs: true
        headers:
          Authorization: "Bearer {{ controller_api_token }}"
        status_code: 200
        timeout: 10
      register: auth_result

    - name: Verify execution environment can process tasks
      ansible.builtin.command:
        cmd: echo "EE is functional"
      changed_when: false
      register: ee_check

    - name: Verify authenticated API data path works
      ansible.builtin.uri:
        url: "{{ controller_api_url }}/jobs/?page_size=1"
        method: GET
        validate_certs: true
        headers:
          Authorization: "Bearer {{ controller_api_token }}"
        status_code: 200
        timeout: 15
      register: jobs_check

    - name: Health check summary
      ansible.builtin.assert:
        that:
          - ping_result.status == 200
          - auth_result.status == 200
          - ee_check.rc == 0
          - jobs_check.status == 200
        success_msg: >-
          All checks passed.
          API: OK | Auth: OK | EE: OK | Jobs API: OK |
          Controller version: {{ ping_result.json.version | default('unknown') }}
        fail_msg: "One or more health checks failed. Review task output above."
