---
- name: AAP wave stress test
  hosts: localhost
  gather_facts: false

  vars:
    number_of_waves: 12
    jobs_per_wave: 10
    wave_pause_seconds: 30
    wait_for_and_check_if_job_finished_seconds: 15
    wait_for_and_check_if_job_finished_timeout: 900

    total_jobs_launched: 0
    total_launch_failures: 0
    total_job_failures: 0
    total_job_successes: 0
    latency_samples: []

  tasks:
    - name: Verify target job template exists
      ansible.builtin.uri:
        url: "{{ controller_api_url }}/job_templates/{{ stress_job_template_id }}/"
        method: GET
        validate_certs: true
        headers:
          Authorization: "Bearer {{ controller_api_token }}"
        status_code: 200
        timeout: 15
      register: template_check

    - name: Show stress test parameters
      ansible.builtin.debug:
        msg:
          - "Template: {{ template_check.json.name }} (ID {{ stress_job_template_id }})"
          - "Waves: {{ number_of_waves }}"
          - "Jobs per wave: {{ jobs_per_wave }}"
          - "Pause between waves: {{ wave_pause_seconds }}s"
          - "Job timeout: {{ job_timeout_seconds }}s"

    - name: Run stress waves
      ansible.builtin.include_tasks:
        file: tasks/stress-wave.yml
      loop: "{{ range(1, number_of_waves + 1) | list }}"
      loop_control:
        loop_var: wave_number
        label: "wave {{ wave_number }}"

    - name: Show final summary
      ansible.builtin.debug:
        msg:
          - "Stress test complete"
          - "Waves executed: {{ number_of_waves }}"
          - "Total launched jobs: {{ total_jobs_launched }}"
          - "Total launch failures: {{ total_launch_failures }}"
          - "Total successful jobs: {{ total_job_successes }}"
          - "Total failed jobs: {{ total_job_failures }}"
          - "Average API response time: {{ ((latency_samples | sum) / (latency_samples | length)) | round(2) if (latency_samples | length) > 0 else 'N/A' }}s"

    - name: Assert failure rate is acceptable
      ansible.builtin.assert:
        that:
          - total_jobs_launched | int > 0
          - (total_launch_failures | int + total_job_failures | int) < (((total_jobs_launched | int) + (total_launch_failures | int)) * 0.10) | int
        fail_msg: >-
          More than 10% of launches/jobs failed.
          launched={{ total_jobs_launched }},
          launch_failures={{ total_launch_failures }},
          job_failures={{ total_job_failures }}
        success_msg: "Stress test passed with acceptable failure rate."
