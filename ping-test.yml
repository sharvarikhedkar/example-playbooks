---
- name: Ping connectivity test
  hosts: localhost
  gather_facts: false

  tasks:
    - name: Ping google.com
      ansible.builtin.command: ping -c 3 google.com
      register: ping_result
      changed_when: false
      ignore_errors: true

    - name: Assert ping succeeded
      ansible.builtin.assert:
        that:
          - ping_result.rc == 0
        fail_msg: "Ping to google.com failed"
        success_msg: "Ping to google.com succeeded"